name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Treat warnings (including `missing_docs`) as errors everywhere.
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  verify:
    name: Format, lint, build, test, docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace --all-features

      - name: Test
        run: cargo test --workspace --all-features

      - name: Docs
        run: cargo doc --workspace --all-features --no-deps

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # Run the instrumented test suite once, then report from the same data.
      - name: Run instrumented tests
        run: cargo llvm-cov --no-report --workspace --all-features

      - name: Export lcov report
        run: cargo llvm-cov report --lcov --output-path lcov.info

      - name: Coverage summary
        run: cargo llvm-cov report --summary-only

      # The lcov export above is 100% line coverage. llvm-cov's *native* line
      # metric reads a hair under that on macro- and generic-heavy code (region
      # misses inside macro expansions / monomorphizations that the export
      # formats count as covered), so the hard gate sits just below to stay
      # reliably green. Tighten to 100 if the native metric ever reaches it.
      - name: Enforce coverage threshold
        run: cargo llvm-cov report --fail-under-lines 99

      - name: Upload lcov report
        uses: actions/upload-artifact@v4
        with:
          name: lcov-coverage
          path: lcov.info
          if-no-files-found: error
