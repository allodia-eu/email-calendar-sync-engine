# Codecov configuration.
#
# The authoritative coverage gate is the `Code coverage` GitHub Actions job
# (`cargo llvm-cov --fail-under-lines`, see .github/workflows/ci.yml): it enforces
# a real line-coverage floor with documented test-support exclusions. Codecov's
# own commit statuses are supplementary signal here, not a merge gate.
#
# `patch` (diff coverage) is therefore made **informational** — it still reports
# the patch's coverage on the PR, but never fails the check. Every provider slice's
# diff necessarily includes un-mockable "dial glue": the raw connect/send transport
# and the provider `connect` path, exercised only by the gated live tests (excluded
# from the uploaded report, exactly as for the JMAP and IMAP providers). A blocking
# patch gate fails on every provider PR (it did on #9 and #10) for code that *is*
# covered live, not for a real regression — noise, not signal. `project` keeps its
# default status as a genuine "did overall coverage drop" signal.
coverage:
  status:
    patch:
      default:
        informational: true
